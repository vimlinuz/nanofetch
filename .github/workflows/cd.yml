name: Release
on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed
permissions:
  contents: write
env:
  CARGO_TERM_COLOR: always
jobs:
  check-version:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changed.outputs.changed }}
      version: ${{ steps.current.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - name: Get current version
        id: current
        run: |
          ver=$(grep '^version' Cargo.toml | head -1 | sed 's/.*version\s*=\s*["'"'"']\([^"'"'"']*\)["'"'"'].*/\1/')
          echo "version=$ver" >> $GITHUB_OUTPUT
      - name: Get previous version
        id: previous
        run: |
          prev_ver=$(git show HEAD~1:Cargo.toml | grep '^version' | head -1 | sed 's/.*version\s*=\s*["'"'"']\([^"'"'"']*\)["'"'"'].*/\1/')
          echo "version=$prev_ver" >> $GITHUB_OUTPUT
      - name: Check for version change
        id: changed
        run: |
          echo "Current version : ${{ steps.current.outputs.version }}"
          echo "Previous version: ${{ steps.previous.outputs.version }}"
          if [ "${{ steps.current.outputs.version }}" != "${{ steps.previous.outputs.version }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  publish:
    needs: [check-version, build]
    if: needs.check-version.outputs.changed == 'true' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  build:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package release asset
        run: |
          version=${{ needs.check-version.outputs.version }}
          asset_name="nanofetch-${version}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          tar -czf "dist/${asset_name}" \
          -C "target/${{ matrix.target }}/release" nanofetch
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/

  release:
    needs: [check-version, publish, build]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          version=${{ needs.check-version.outputs.version }}
          gh release create "v${version}" \
          --title "v${version}" \
          --generate-notes \
          --target "${{ github.event.workflow_run.head_sha }}" \
          dist/*.tar.gz
